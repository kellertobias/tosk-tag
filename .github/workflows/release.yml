name: Release

# GitHub is a push mirror of the Forgejo repository. The v* tag is created by the Forgejo
# release job (see .forgejo/workflows/release.yml) and mirrored here; this workflow reacts to
# it, tests and builds the macOS app, and publishes a GitHub Release with the artifact.
#
# A macOS app cannot be built in a Linux container (the macOS SDK, SwiftUI and codesign are
# Apple-only), so this job requires a macOS runner. macos-14 is Apple Silicon and still emits a
# universal (arm64 + x86_64) binary, so the release runs on both Intel and Apple Silicon Macs.
#
# The app is ad-hoc signed only (no Apple Developer account), so the release binary is not
# notarized. Users install via Homebrew (builds from source) or clear quarantine manually.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    env:
      # Universal binary: runs on Apple Silicon and Intel.
      SWIFT_ARCHS: "arm64 x86_64"
    steps:
      - uses: actions/checkout@v4

      # The package needs the Swift 6 toolchain (swift-tools-version 6.0). The runner's default
      # Xcode can be older (Swift 5.10), so select the newest Xcode installed on the image and
      # export it as DEVELOPER_DIR for every following step. swift-testing (the `Testing`
      # module) also ships with Xcode, so tests build against it too.
      - name: Select newest Xcode
        run: |
          set -euo pipefail
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          [ -n "$XCODE" ] || XCODE=/Applications/Xcode.app
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"

      - name: Swift toolchain
        run: swift --version

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build release app bundle (unsigned, ad-hoc, universal)
        run: ./build archive

      - name: Package archive
        id: pkg
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          APP=".build/archive/Tobisk Tag Editor.app"
          echo "Architectures: $(lipo -archs "$APP/Contents/MacOS/TagEditor")"
          OUT="ToskTag-${VERSION}-macos-universal.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          shasum -a 256 "$OUT" > "$OUT.sha256"
          echo "zip=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
          ZIP: ${{ steps.pkg.outputs.zip }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$ZIP" "$ZIP.sha256" \
            --title "Tosk Tag v$VERSION" \
            --generate-notes \
            --verify-tag
