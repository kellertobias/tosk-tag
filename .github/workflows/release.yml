name: Release

# GitHub is a push mirror of the Forgejo repository. The v* tag is created by the Forgejo
# release job (see .forgejo/workflows/ci.yml) and mirrored here; this workflow reacts to it,
# builds the macOS app on Apple Silicon, and publishes a GitHub Release with the artifact.
#
# The app is ad-hoc signed only (no Apple Developer account), so the release binary is not
# notarized. Users install via Homebrew (builds from source) or clear quarantine manually.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # macos-14 is an Apple Silicon (arm64) runner.
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release app bundle (unsigned, ad-hoc)
        run: ./build archive

      - name: Package archive
        id: pkg
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          APP=".build/archive/Tobisk Tag Editor.app"
          OUT="ToskTag-${VERSION}-macos-arm64.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          shasum -a 256 "$OUT" > "$OUT.sha256"
          echo "zip=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
          ZIP: ${{ steps.pkg.outputs.zip }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$ZIP" "$ZIP.sha256" \
            --title "Tosk Tag v$VERSION" \
            --generate-notes \
            --verify-tag
